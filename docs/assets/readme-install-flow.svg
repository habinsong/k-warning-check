<svg width="1440" height="520" viewBox="0 0 1440 520" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1440" height="520" rx="32" fill="#0F172A"/>
  <text x="84" y="102" fill="#F8FAFC" font-family="Georgia, serif" font-size="54" font-weight="700">Install paths at a glance</text>
  <text x="84" y="146" fill="#94A3B8" font-family="Arial, sans-serif" font-size="24">Use the committed release assets in build/, or rebuild from source when you need a fresh package.</text>
  <rect x="84" y="208" width="390" height="232" rx="24" fill="#111827" stroke="#334155"/>
  <text x="120" y="258" fill="#F8FAFC" font-family="Arial, sans-serif" font-size="28" font-weight="700">Chrome extension</text>
  <text x="120" y="306" fill="#CBD5E1" font-family="Arial, sans-serif" font-size="22">1. Open Chrome extensions</text>
  <text x="120" y="340" fill="#CBD5E1" font-family="Arial, sans-serif" font-size="22">2. Enable developer mode</text>
  <text x="120" y="374" fill="#CBD5E1" font-family="Arial, sans-serif" font-size="22">3. Load <tspan font-weight="700">build/dist</tspan></text>
  <rect x="120" y="392" width="122" height="34" rx="17" fill="#DBEAFE"/>
  <text x="158" y="415" fill="#1D4ED8" font-family="Arial, sans-serif" font-size="16" font-weight="700">Unpacked</text>
  <rect x="524" y="208" width="390" height="232" rx="24" fill="#111827" stroke="#334155"/>
  <text x="560" y="258" fill="#F8FAFC" font-family="Arial, sans-serif" font-size="28" font-weight="700">macOS app</text>
  <text x="560" y="306" fill="#CBD5E1" font-family="Arial, sans-serif" font-size="22">1. Open <tspan font-weight="700">build/mac</tspan></text>
  <text x="560" y="340" fill="#CBD5E1" font-family="Arial, sans-serif" font-size="22">2. Use the DMG or zipped app bundle</text>
  <text x="560" y="374" fill="#CBD5E1" font-family="Arial, sans-serif" font-size="22">3. Launch and add provider keys</text>
  <rect x="560" y="392" width="132" height="34" rx="17" fill="#ECFCCB"/>
  <text x="602" y="415" fill="#3F6212" font-family="Arial, sans-serif" font-size="16" font-weight="700">Signed app</text>
  <rect x="964" y="208" width="390" height="232" rx="24" fill="#111827" stroke="#334155"/>
  <text x="1000" y="258" fill="#F8FAFC" font-family="Arial, sans-serif" font-size="28" font-weight="700">Windows app</text>
  <text x="1000" y="306" fill="#CBD5E1" font-family="Arial, sans-serif" font-size="22">1. Open <tspan font-weight="700">build/windows</tspan></text>
  <text x="1000" y="340" fill="#CBD5E1" font-family="Arial, sans-serif" font-size="22">2. Run the bundled EXE</text>
  <text x="1000" y="374" fill="#CBD5E1" font-family="Arial, sans-serif" font-size="22">3. Codex remains hidden on Windows</text>
  <rect x="1000" y="392" width="126" height="34" rx="17" fill="#FFF7ED"/>
  <text x="1036" y="415" fill="#9A3412" font-family="Arial, sans-serif" font-size="16" font-weight="700">Windows-safe</text>
</svg>
